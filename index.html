<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZaysPhotoStrip Studio ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0eb;
  --surface: #ffffff;
  --dark: #1a1410;
  --muted: #8a7f78;
  --accent: #d4826a;
  --accent2: #7cb8a8;
  --border: #e8e0d8;
  --shadow: 0 24px 64px rgba(26,20,16,0.13);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 5% 0%, rgba(212,130,106,0.1) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 95% 100%, rgba(124,184,168,0.1) 0%, transparent 60%);
  pointer-events:none; z-index:0;
}

.app { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; padding:28px 16px 60px; gap:24px; }

/* Header */
header { text-align:center; }
.brand { font-family:'Playfair Display', serif; font-size:clamp(1.8rem,5vw,2.8rem); letter-spacing:.04em; color:var(--dark); }
.brand em { font-style:italic; color:var(--accent); }
.sub { font-size:.6rem; letter-spacing:.35em; text-transform:uppercase; color:var(--muted); margin-top:4px; }
.ornament { display:flex; align-items:center; gap:10px; justify-content:center; margin-top:8px; }
.ornament-line { flex:1; max-width:80px; height:1px; background:linear-gradient(to right, transparent, var(--accent)); }
.ornament-line.r { background:linear-gradient(to left, transparent, var(--accent)); }
.ornament span { font-size:.9rem; color:var(--accent); }

/* ===== MAIN LAYOUT ===== */
.main { display:flex; gap:24px; align-items:flex-start; width:100%; max-width:1160px; }
@media(max-width:900px){ .main{ flex-direction:column; align-items:center; } }

/* ===== LEFT: CAMERA + GALLERY ===== */
.left-col { flex:1; min-width:280px; max-width:520px; display:flex; flex-direction:column; gap:16px; }

/* Camera feed */
.cam-wrap {
  background:#111;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  aspect-ratio:4/3;
  box-shadow: var(--shadow);
}
#liveVideo {
  width:100%; height:100%;
  object-fit:cover;
  transform:scaleX(-1);
  display:block;
}
.cam-overlay-top {
  position:absolute; top:12px; left:12px; right:12px;
  display:flex; justify-content:space-between; align-items:center;
  pointer-events:none;
}
.cam-badge {
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;
  padding:5px 12px;
  font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:white;
}
.cam-rec { width:8px; height:8px; border-radius:50%; background:#ff4444; display:inline-block; margin-right:6px; animation:blink 1.2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.cam-countdown-overlay {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Playfair Display', serif;
  font-size:clamp(80px,18vw,140px);
  font-weight:700; color:white;
  background:rgba(0,0,0,0.45);
  opacity:0; pointer-events:none;
  transition:opacity .15s;
  text-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.cam-countdown-overlay.show { opacity:1; }

.cam-flash {
  position:absolute; inset:0;
  background:white; opacity:0; pointer-events:none;
}
.cam-flash.pop { animation: flashAnim .35s ease forwards; }
@keyframes flashAnim { 0%{opacity:.9} 100%{opacity:0} }

.cam-no-stream {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; color:rgba(255,255,255,0.5);
}
.cam-no-stream svg { opacity:.4; }
.cam-no-stream p { font-size:.7rem; letter-spacing:.15em; text-transform:uppercase; }

/* Camera controls */
.cam-controls {
  display:flex; gap:10px; align-items:center;
}

.btn-start-cam {
  flex:1; padding:14px;
  background:var(--dark); color:white;
  border:none; border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:.65rem; letter-spacing:.25em; text-transform:uppercase;
  cursor:pointer; transition:all .25s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-start-cam:hover { background:#3a2820; }
.btn-start-cam.active { background:#c0392b; }

.btn-shoot {
  flex:2; padding:14px;
  background:var(--accent); color:white;
  border:none; border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:.65rem; letter-spacing:.25em; text-transform:uppercase;
  cursor:pointer; transition:all .25s;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn-shoot:hover:not(:disabled) { filter:brightness(1.1); transform:translateY(-1px); }
.btn-shoot:disabled { opacity:.35; cursor:not-allowed; }
.btn-shoot:active:not(:disabled) { transform:translateY(0); }

/* Timer row */
.timer-row { display:flex; gap:8px; align-items:center; }
.timer-label-sm { font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); white-space:nowrap; }
.timer-chip {
  padding:6px 14px;
  border:1.5px solid var(--border);
  border-radius:20px;
  font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
  color:var(--muted); cursor:pointer; transition:all .2s;
  background:transparent; font-family:'DM Sans',sans-serif;
}
.timer-chip.on { border-color:var(--accent); color:var(--accent); background:rgba(212,130,106,.07); }

/* ===== GALLERY ===== */
.gallery-wrap {
  background:var(--surface);
  border-radius:10px;
  padding:18px;
  box-shadow:0 4px 20px rgba(26,20,16,.06);
}
.gallery-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
}
.gallery-title {
  font-size:.6rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted);
}
.gallery-count {
  font-size:.6rem; letter-spacing:.1em; color:var(--accent);
  background:rgba(212,130,106,.1); padding:2px 8px; border-radius:10px;
}
.gallery-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap:8px;
  max-height:220px;
  overflow-y:auto;
}
.gallery-grid::-webkit-scrollbar { width:4px; }
.gallery-grid::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.gallery-item {
  position:relative;
  aspect-ratio:4/3;
  border-radius:4px;
  overflow:hidden;
  cursor:pointer;
  border:2px solid transparent;
  transition:all .2s;
}
.gallery-item:hover { border-color:var(--accent); transform:scale(1.03); }
.gallery-item img {
  width:100%; height:100%; object-fit:cover; display:block;
}
.gallery-item-num {
  position:absolute; top:3px; left:4px;
  font-size:.55rem; color:white;
  background:rgba(0,0,0,.5); border-radius:3px;
  padding:1px 5px; font-weight:500;
  pointer-events:none;
}
.gallery-item-dl {
  position:absolute; bottom:3px; right:3px;
  width:22px; height:22px;
  background:rgba(0,0,0,.55); border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  color:white; font-size:.65rem;
  transition:background .2s;
  cursor:pointer;
  z-index:2;
}
.gallery-item-dl:hover { background:var(--accent); }

.gallery-empty {
  grid-column:1/-1;
  padding:28px; text-align:center;
  color:var(--muted); font-size:.65rem; letter-spacing:.1em;
}

/* ===== RIGHT: STRIP + SETTINGS ===== */
.right-col {
  display:flex; flex-direction:column; align-items:center; gap:18px;
  flex:0 0 auto;
}

/* Strip */
.strip-outer {
  display:flex; flex-direction:column; align-items:center; gap:12px;
}

#photoStrip {
  display:flex; flex-direction:column;
  box-shadow: var(--shadow), 0 0 0 1px rgba(0,0,0,0.06);
  border-radius:4px; overflow:hidden;
  transition:all .35s;
}

/* Slot in strip */
.strip-slot {
  position:relative;
  overflow:hidden;
  flex-shrink:0;
  background:#1a1410;
  cursor:pointer;
  transition:all .2s;
}
.strip-slot:hover .slot-hover-hint { opacity:1; }
.slot-hover-hint {
  position:absolute; inset:0;
  background:rgba(0,0,0,0.35);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
  font-size:.6rem; letter-spacing:.15em; text-transform:uppercase;
  color:white; gap:6px;
  flex-direction:column;
}
.slot-hover-hint svg { opacity:.8; }

.strip-slot img {
  width:100%; height:100%;
  object-fit:cover; display:block;
}

/* empty slot pattern */
.strip-slot.empty {
  background: repeating-linear-gradient(
    45deg,
    #1a1410,
    #1a1410 6px,
    #221a14 6px,
    #221a14 12px
  );
}

.slot-index-label {
  position:absolute; top:5px; left:6px;
  font-family:'Playfair Display',serif;
  font-size:.7rem; color:rgba(255,255,255,.22);
  pointer-events:none;
}

/* Dots */
.slots-dots { display:flex; gap:6px; }
.slot-dot { flex:1; height:5px; border-radius:3px; background:var(--border); transition:background .3s; }
.slot-dot.filled { background:var(--accent); }

/* Strip caption bar */
#captionBar {
  font-family:'Playfair Display',serif;
  font-style:italic;
  text-align:center;
  letter-spacing:.04em;
}

/* ===== SETTINGS PANEL ===== */
.settings-col {
  flex:0 0 auto; min-width:240px; max-width:300px;
  display:flex; flex-direction:column; gap:14px;
}

.panel {
  background:var(--surface); border-radius:8px;
  padding:18px; box-shadow:0 4px 20px rgba(26,20,16,.06);
}
.panel-label {
  font-size:.58rem; letter-spacing:.3em; text-transform:uppercase;
  color:var(--muted); margin-bottom:12px;
  display:flex; align-items:center; gap:8px;
}
.panel-label::after { content:''; flex:1; height:1px; background:var(--border); }

/* Frame count */
.count-row { display:flex; gap:8px; }
.count-btn {
  flex:1; padding:12px 6px;
  border:2px solid var(--border); border-radius:6px;
  background:transparent;
  font-family:'Playfair Display',serif; font-size:1.2rem; color:var(--muted);
  cursor:pointer; transition:all .2s;
  display:flex; flex-direction:column; align-items:center; gap:2px;
}
.count-btn span { font-family:'DM Sans',sans-serif; font-size:.5rem; letter-spacing:.15em; text-transform:uppercase; }
.count-btn.on { border-color:var(--accent); color:var(--accent); background:rgba(212,130,106,.05); }

/* Theme grid */
.theme-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.theme-card {
  border:2px solid transparent; border-radius:6px;
  overflow:hidden; cursor:pointer; transition:all .2s; position:relative;
}
.theme-card.on { border-color:var(--accent); }
.theme-preview {
  height:60px; display:flex; align-items:center; justify-content:center;
  font-size:.7rem; letter-spacing:.08em;
  font-family:'Playfair Display',serif; font-style:italic;
  position:relative; overflow:hidden;
}
.theme-name {
  position:absolute; bottom:0; left:0; right:0;
  font-size:.5rem; letter-spacing:.12em; text-transform:uppercase;
  text-align:center; padding:3px;
  background:rgba(0,0,0,.28); color:white;
  font-family:'DM Sans',sans-serif; font-style:normal;
}
.theme-card.on::after {
  content:'✓'; position:absolute; top:3px; right:5px;
  color:var(--accent); font-size:.75rem; font-weight:bold;
}

/* Caption input */
.caption-input {
  width:100%; padding:11px;
  border:1.5px solid var(--border); border-radius:4px;
  font-family:'Playfair Display',serif; font-size:.95rem; font-style:italic;
  color:var(--dark); background:transparent; outline:none; transition:border-color .2s;
}
.caption-input:focus { border-color:var(--accent); }
.caption-input::placeholder { color:var(--muted); }

/* Action btns */
.action-btn {
  width:100%; padding:14px; border:none; border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:.65rem; letter-spacing:.25em; text-transform:uppercase;
  cursor:pointer; transition:all .3s;
}
.action-btn.primary { background:var(--dark); color:white; }
.action-btn.primary:hover { background:#3a2820; }
.action-btn.accent { background:var(--accent); color:white; }
.action-btn.accent:hover { filter:brightness(1.08); }
.action-btn:disabled { opacity:.35; cursor:not-allowed; }

/* ===== PHOTO PICKER MODAL ===== */
.picker-modal {
  position:fixed; inset:0;
  background:rgba(26,20,16,.8);
  z-index:400;
  display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .25s;
  backdrop-filter:blur(6px);
}
.picker-modal.open { opacity:1; pointer-events:all; }
.picker-box {
  background:white; border-radius:10px; padding:28px;
  max-width:500px; width:100%;
  display:flex; flex-direction:column; gap:18px;
  transform:translateY(24px); transition:transform .25s;
  box-shadow:0 32px 80px rgba(0,0,0,.3);
  max-height:90vh; overflow-y:auto;
}
.picker-modal.open .picker-box { transform:translateY(0); }
.picker-title {
  font-family:'Playfair Display',serif; font-size:1.2rem; text-align:center;
}
.picker-sub { font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); text-align:center; }
.picker-grid {
  display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
}
.picker-item {
  position:relative; aspect-ratio:4/3;
  border-radius:6px; overflow:hidden; cursor:pointer;
  border:3px solid transparent; transition:all .2s;
}
.picker-item:hover { border-color:var(--accent2); transform:scale(1.03); }
.picker-item img { width:100%; height:100%; object-fit:cover; display:block; }
.picker-item-num {
  position:absolute; top:4px; left:5px;
  font-size:.55rem; color:white;
  background:rgba(0,0,0,.55); border-radius:3px; padding:1px 5px;
}

.picker-actions { display:flex; gap:10px; }
.btn-clear-slot {
  flex:1; padding:12px;
  background:transparent; color:#c0392b;
  border:1.5px solid #fce; border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:.6rem; letter-spacing:.2em; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.btn-clear-slot:hover { background:#fff5f5; }
.btn-cancel {
  flex:1; padding:12px;
  background:transparent; color:var(--muted);
  border:1.5px solid var(--border); border-radius:6px;
  font-family:'DM Sans',sans-serif;
  font-size:.6rem; letter-spacing:.2em; text-transform:uppercase;
  cursor:pointer; transition:all .2s;
}
.btn-cancel:hover { border-color:var(--accent); color:var(--accent); }

/* ===== EXPORT MODAL ===== */
.export-modal {
  position:fixed; inset:0;
  background:rgba(26,20,16,.85);
  z-index:500; display:flex; align-items:center; justify-content:center; padding:20px;
  opacity:0; pointer-events:none; transition:opacity .3s;
  backdrop-filter:blur(8px);
}
.export-modal.open { opacity:1; pointer-events:all; }
.export-box {
  background:white; border-radius:10px; padding:28px;
  max-width:420px; width:100%;
  display:flex; flex-direction:column; gap:14px; align-items:center;
  transform:translateY(24px); transition:transform .3s;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
}
.export-modal.open .export-box { transform:translateY(0); }
.export-title { font-family:'Playfair Display',serif; font-size:1.3rem; text-align:center; }
.export-sub { font-size:.6rem; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); text-align:center; }
.export-box img { max-width:100%; border-radius:4px; box-shadow:0 6px 24px rgba(0,0,0,.15); max-height:55vh; object-fit:contain; }
.export-actions { display:flex; gap:10px; width:100%; }
.export-box .action-btn { padding:13px; }

canvas#outputCanvas { display:none; }

/* Toast */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(30px);
  background:var(--dark); color:white;
  padding:10px 20px; border-radius:20px;
  font-size:.65rem; letter-spacing:.15em; text-transform:uppercase;
  opacity:0; transition:all .3s; z-index:999; pointer-events:none;
  white-space:nowrap;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">Zays Photo<em>Strip</em> Studio</div>
    <div class="sub">Ambil foto · Pilih · Cetak Strip</div>
    <div class="ornament">
      <div class="ornament-line"></div>
      <span>✦</span>
      <div class="ornament-line r"></div>
    </div>
  </header>

  <div class="main">
    <!-- ===== LEFT: CAMERA + GALLERY ===== -->
    <div class="left-col">
      <!-- Camera -->
      <div class="cam-wrap" id="camWrap">
        <div class="cam-no-stream" id="camNoStream">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7-13h-2.17l-1.24-1.35A2 2 0 0 0 14.12 1H9.88a2 2 0 0 0-1.47.65L7.17 2.5H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-13a2 2 0 0 0-2-2z"/></svg>
          <p>Tekan Mulai Kamera</p>
        </div>
        <video id="liveVideo" autoplay playsinline style="display:none;"></video>
        <div class="cam-overlay-top" id="camOverlayTop" style="display:none;">
          <div class="cam-badge"><span class="cam-rec"></span>Live</div>
          <div class="cam-badge" id="photoCountBadge">0 foto</div>
        </div>
        <div class="cam-countdown-overlay" id="camCountdown">3</div>
        <div class="cam-flash" id="camFlash"></div>
      </div>

      <!-- Camera controls -->
      <div class="cam-controls">
        <button class="btn-start-cam" id="btnStartCam" onclick="toggleCamera()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7-13h-2.17l-1.24-1.35A2 2 0 0 0 14.12 1H9.88a2 2 0 0 0-1.47.65L7.17 2.5H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-13a2 2 0 0 0-2-2z"/></svg>
          Mulai Kamera
        </button>
        <button class="btn-shoot" id="btnShoot" onclick="shootPhoto()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
          Ambil Foto
        </button>
      </div>

      <!-- Timer -->
      <div class="timer-row">
        <span class="timer-label-sm">Timer:</span>
        <button class="timer-chip on" onclick="setTimer(0,this)">Langsung</button>
        <button class="timer-chip" onclick="setTimer(3,this)">3 dtk</button>
        <button class="timer-chip" onclick="setTimer(5,this)">5 dtk</button>
      </div>

      <!-- Gallery -->
      <div class="gallery-wrap">
        <div class="gallery-header">
          <div class="gallery-title">Hasil Foto</div>
          <div class="gallery-count" id="galleryCount">0 foto</div>
        </div>
        <div class="gallery-grid" id="galleryGrid">
          <div class="gallery-empty">Belum ada foto. Ambil foto dulu!</div>
        </div>
      </div>
    </div>

    <!-- ===== CENTER: STRIP ===== -->
    <div class="right-col">
      <div class="strip-outer">
        <div id="photoStrip"></div>
        <div class="slots-dots" id="slotsDots"></div>
        <button class="action-btn accent" id="exportBtn" disabled onclick="exportStrip()">
          ✦ &nbsp;Export Photo Strip
        </button>
      </div>
    </div>

    <!-- ===== RIGHT: SETTINGS ===== -->
    <div class="settings-col">
      <!-- Frame count -->
      <div class="panel">
        <div class="panel-label">Jumlah Bingkai</div>
        <div class="count-row">
          <button class="count-btn" onclick="setCount(2,this)">2<span>foto</span></button>
          <button class="count-btn on" onclick="setCount(3,this)">3<span>foto</span></button>
          <button class="count-btn" onclick="setCount(4,this)">4<span>foto</span></button>
        </div>
      </div>

      <!-- Theme -->
      <div class="panel">
        <div class="panel-label">Tema Bingkai</div>
        <div class="theme-grid" id="themeGrid"></div>
      </div>

      <!-- Caption -->
      <div class="panel">
        <div class="panel-label">Caption Strip</div>
        <input class="caption-input" id="captionInput" type="text" placeholder="Tulis nama / tanggal..." maxlength="30">
      </div>

      <!-- Reset strip -->
      <button class="action-btn primary" onclick="resetStrip()">↺ &nbsp;Reset Bingkai Strip</button>
      <!-- Clear gallery -->
      <button class="action-btn primary" style="background:#7a6a5a;" onclick="clearGallery()">🗑 &nbsp;Hapus Semua Foto</button>
    </div>
  </div>
</div>

<!-- Photo Picker Modal -->
<div class="picker-modal" id="pickerModal" onclick="closePickerBackdrop(event)">
  <div class="picker-box">
    <div class="picker-title">Pilih Foto</div>
    <div class="picker-sub" id="pickerSub">Untuk slot ke-1</div>
    <div class="picker-grid" id="pickerGrid"></div>
    <div class="picker-actions">
      <button class="btn-clear-slot" onclick="clearSlot()">Kosongkan Slot</button>
      <button class="btn-cancel" onclick="closePicker()">Batal</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="export-modal" id="exportModal" onclick="closeExportBackdrop(event)">
  <div class="export-box">
    <div class="export-title">Photo Strip Siap! 🎉</div>
    <div class="export-sub">Tekan unduh untuk menyimpan</div>
    <img id="exportPreview" src="" alt="Preview">
    <div class="export-actions">
      <button class="action-btn accent" style="flex:2;" onclick="downloadStrip()">⬇ Unduh Strip</button>
      <button class="action-btn primary" style="flex:1;" onclick="closeExportModal()">Tutup</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="outputCanvas" style="display:none;"></canvas>

<script>
// ===== STATE =====
let frameCount = 3;
let currentTheme = 'classic';
let timerSec = 0;
let cameraStream = null;
let isShooting = false;
let isCameraOn = false;

// Gallery: array of { dataURL, id }
let gallery = [];
let photoIdCounter = 0;

// Strip slots: array of photoId or null
let stripSlots = [null, null, null];

// Which slot is being picked
let pickerTargetSlot = -1;

// ===== THEMES =====
const themes = {
  classic: {
    label:'Klasik Putih', previewBg:'#fff', previewText:'Klasik', previewColor:'#1a1410',
    stripBg:'#ffffff', gapColor:'#ffffff', gapSize:12, paddingH:16, paddingTop:20, paddingBottom:10,
    captionBg:'#ffffff', captionColor:'#1a1410', captionFont:'italic bold', watermarkColor:'#c8a96e', cornerColor:'rgba(200,180,160,0.7)',
  },
  film: {
    label:'Film Roll', previewBg:'#1a1410', previewText:'Film', previewColor:'#c8a96e',
    stripBg:'#1a1410', gapColor:'#1a1410', gapSize:8, paddingH:24, paddingTop:16, paddingBottom:10,
    captionBg:'#1a1410', captionColor:'#c8a96e', captionFont:'bold', watermarkColor:'#c8a96e', cornerColor:'rgba(200,169,110,0.7)',
    sprocket:true, sprocketColor:'#2e2822',
  },
  rose: {
    label:'Soft Rose', previewBg:'#fff0ee', previewText:'Rose', previewColor:'#8b3a3a',
    stripBg:'#fff0ee', gapColor:'#fff0ee', gapSize:10, paddingH:14, paddingTop:18, paddingBottom:10,
    captionBg:'#fff0ee', captionColor:'#8b3a3a', captionFont:'italic', watermarkColor:'#c9a09a', cornerColor:'rgba(201,160,154,0.8)',
  },
  cream: {
    label:'Vintage Cream', previewBg:'#f5eedf', previewText:'Vintage', previewColor:'#5c4a2a',
    stripBg:'#f5eedf', gapColor:'#f5eedf', gapSize:10, paddingH:14, paddingTop:16, paddingBottom:10,
    captionBg:'#f5eedf', captionColor:'#5c4a2a', captionFont:'italic', watermarkColor:'#c8a96e', cornerColor:'rgba(200,169,110,0.6)',
  },
  checker: {
    label:'Checker Pop', previewBg:null, checker:true, previewText:'Checker', previewColor:'#fff',
    stripBg:null, gapColor:null, gapSize:8, paddingH:18, paddingTop:18, paddingBottom:8,
    captionBg:'#f5e642', captionColor:'#111', captionFont:'bold', watermarkColor:'#111', cornerColor:'rgba(245,230,66,0.8)',
  },
  y2k: {
    label:'Y2K Vibes', previewBg:null, y2k:true, previewText:'Y2K', previewColor:'#fff',
    stripBg:null, gapColor:null, gapSize:8, paddingH:14, paddingTop:16, paddingBottom:8,
    captionBg:'#b14fff', captionColor:'#fff', captionFont:'bold', watermarkColor:'#fff', cornerColor:'rgba(255,255,100,0.8)',
  },
};

const SLOT_W = 200;
const SLOT_H = 150;

// ===== INIT =====
window.onload = () => {
  buildThemeGrid();
  buildStrip();
  renderDots();
  document.getElementById('captionInput').oninput = (e) => {
    const bar = document.getElementById('captionBar');
    if (bar) bar.textContent = e.target.value || '✦ Blooming Your Days ✦';
  };
};

// ===== THEME =====
function buildThemeGrid() {
  const grid = document.getElementById('themeGrid');
  grid.innerHTML = '';
  Object.entries(themes).forEach(([key, t]) => {
    const card = document.createElement('div');
    card.className = 'theme-card' + (key === currentTheme ? ' on' : '');
    card.onclick = () => {
      currentTheme = key;
      document.querySelectorAll('.theme-card').forEach(c=>c.classList.remove('on'));
      card.classList.add('on');
      buildStrip();
    };
    const prev = document.createElement('div');
    prev.className = 'theme-preview';
    if (t.checker) prev.style.background = 'repeating-conic-gradient(#f5e642 0% 25%,#111 0% 50%) 0 0/20px 20px';
    else if (t.y2k) prev.style.background = 'linear-gradient(135deg,#b14fff,#ff6eb4,#40c9ff)';
    else prev.style.background = t.previewBg || '#eee';
    prev.style.color = t.previewColor;
    prev.innerHTML = `<span>${t.previewText}</span><div class="theme-name">${t.label}</div>`;
    card.appendChild(prev);
    grid.appendChild(card);
  });
}

// ===== COUNT =====
function setCount(n, btn) {
  frameCount = n;
  stripSlots = Array(n).fill(null);
  document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  buildStrip();
  renderDots();
  checkExportReady();
}

// ===== TIMER =====
function setTimer(s, btn) {
  timerSec = s;
  document.querySelectorAll('.timer-chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

// ===== BUILD STRIP =====
function buildStrip() {
  const strip = document.getElementById('photoStrip');
  strip.innerHTML = '';
  const t = themes[currentTheme];

  strip.style.width = SLOT_W + 'px';
  if (t.checker) strip.style.background = 'repeating-conic-gradient(#f5e642 0% 25%,#111 0% 50%) 0 0/20px 20px';
  else if (t.y2k) strip.style.background = 'linear-gradient(180deg,#b14fff,#ff6eb4,#40c9ff)';
  else strip.style.background = t.stripBg || '#fff';
  strip.style.padding = `${t.paddingTop}px ${t.paddingH}px ${t.paddingBottom}px`;
  strip.style.gap = t.gapSize + 'px';
  strip.style.flexDirection = 'column';
  strip.style.display = 'flex';

  for (let i = 0; i < frameCount; i++) {
    const slot = document.createElement('div');
    slot.className = 'strip-slot' + (stripSlots[i] === null ? ' empty' : '');
    slot.style.width = (SLOT_W - t.paddingH * 2) + 'px';
    slot.style.height = SLOT_H + 'px';
    slot.style.borderRadius = '2px';
    slot.dataset.index = i;

    const label = document.createElement('div');
    label.className = 'slot-index-label';
    label.textContent = i + 1;
    slot.appendChild(label);

    const hint = document.createElement('div');
    hint.className = 'slot-hover-hint';
    hint.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 14l-5-5 1.41-1.41L12 14.17l7.59-7.59L21 8l-9 9z"/></svg><span>Pilih Foto</span>`;
    slot.appendChild(hint);

    // If slot has photo
    if (stripSlots[i] !== null) {
      const entry = gallery.find(g => g.id === stripSlots[i]);
      if (entry) {
        const img = document.createElement('img');
        img.src = entry.dataURL;
        slot.insertBefore(img, slot.firstChild);
        hint.querySelector('span').textContent = 'Ganti Foto';
      }
    }

    slot.onclick = () => openPicker(i);
    strip.appendChild(slot);
  }

  // Caption bar
  const bar = document.createElement('div');
  bar.id = 'captionBar';
  bar.style.cssText = `width:100%;text-align:center;padding:8px 4px 4px;font-family:'Playfair Display',serif;font-style:italic;font-size:.85rem;color:${t.captionColor};letter-spacing:.04em;`;
  bar.textContent = document.getElementById('captionInput')?.value || '✦ Blooming Your Days ✦';
  strip.appendChild(bar);

  // Sync dots width
  document.getElementById('slotsDots').style.width = SLOT_W + 'px';
}

// ===== DOTS =====
function renderDots() {
  const dotsEl = document.getElementById('slotsDots');
  dotsEl.innerHTML = '';
  dotsEl.style.width = SLOT_W + 'px';
  for (let i = 0; i < frameCount; i++) {
    const d = document.createElement('div');
    d.className = 'slot-dot' + (stripSlots[i] !== null ? ' filled' : '');
    d.id = 'dot-' + i;
    dotsEl.appendChild(d);
  }
}

function updateDots() {
  for (let i = 0; i < frameCount; i++) {
    const d = document.getElementById('dot-' + i);
    if (d) d.className = 'slot-dot' + (stripSlots[i] !== null ? ' filled' : '');
  }
}

function checkExportReady() {
  const ready = stripSlots.every(s => s !== null);
  document.getElementById('exportBtn').disabled = !ready;
}

// ===== CAMERA =====
async function toggleCamera() {
  if (isCameraOn) {
    stopCamera();
  } else {
    await startCamera();
  }
}

async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:1280, height:720 }, audio:false });
    const video = document.getElementById('liveVideo');
    video.srcObject = cameraStream;
    video.style.display = 'block';
    document.getElementById('camNoStream').style.display = 'none';
    document.getElementById('camOverlayTop').style.display = 'flex';
    isCameraOn = true;
    const btn = document.getElementById('btnStartCam');
    btn.classList.add('active');
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg> Stop Kamera`;
    document.getElementById('btnShoot').disabled = false;
  } catch(e) {
    showToast('Tidak bisa akses kamera!');
  }
}

function stopCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t=>t.stop()); cameraStream = null; }
  const video = document.getElementById('liveVideo');
  video.style.display = 'none';
  video.srcObject = null;
  document.getElementById('camNoStream').style.display = 'flex';
  document.getElementById('camOverlayTop').style.display = 'none';
  isCameraOn = false;
  const btn = document.getElementById('btnStartCam');
  btn.classList.remove('active');
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7zm7-13h-2.17l-1.24-1.35A2 2 0 0 0 14.12 1H9.88a2 2 0 0 0-1.47.65L7.17 2.5H5a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-13a2 2 0 0 0-2-2z"/></svg> Mulai Kamera`;
  document.getElementById('btnShoot').disabled = true;
}

function shootPhoto() {
  if (isShooting || !isCameraOn) return;
  isShooting = true;
  document.getElementById('btnShoot').disabled = true;

  if (timerSec === 0) {
    doCapture();
  } else {
    runCountdown(timerSec);
  }
}

function runCountdown(n) {
  const el = document.getElementById('camCountdown');
  el.classList.add('show');
  el.textContent = n;
  if (n > 0) {
    setTimeout(() => runCountdown(n - 1), 1000);
  } else {
    el.classList.remove('show');
    doCapture();
  }
}

function doCapture() {
  const video = document.getElementById('liveVideo');
  const flash = document.getElementById('camFlash');

  flash.classList.add('pop');
  setTimeout(() => flash.classList.remove('pop'), 400);

  // Draw to canvas (mirrored like selfie)
  const tmp = document.createElement('canvas');
  tmp.width = 1280; tmp.height = 720;
  const ctx = tmp.getContext('2d');
  ctx.save();
  ctx.translate(tmp.width, 0);
  ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, tmp.width, tmp.height);
  ctx.restore();

  const dataURL = tmp.toDataURL('image/jpeg', 0.92);
  const id = ++photoIdCounter;
  gallery.push({ id, dataURL });

  addToGallery({ id, dataURL });
  showToast('Foto berhasil diambil!');

  isShooting = false;
  document.getElementById('btnShoot').disabled = false;
}

// ===== GALLERY =====
function addToGallery(entry) {
  const grid = document.getElementById('galleryGrid');
  // Remove empty msg
  const empty = grid.querySelector('.gallery-empty');
  if (empty) empty.remove();

  const item = document.createElement('div');
  item.className = 'gallery-item';
  item.id = 'gitem-' + entry.id;

  const img = document.createElement('img');
  img.src = entry.dataURL;
  item.appendChild(img);

  const num = document.createElement('div');
  num.className = 'gallery-item-num';
  num.textContent = '#' + entry.id;
  item.appendChild(num);

  const dl = document.createElement('div');
  dl.className = 'gallery-item-dl';
  dl.title = 'Download foto ini';
  dl.innerHTML = '⬇';
  dl.onclick = (e) => { e.stopPropagation(); downloadSinglePhoto(entry.dataURL, entry.id); };
  item.appendChild(dl);

  // Click to add to first empty slot
  item.onclick = () => quickAssign(entry.id);
  grid.appendChild(item);

  // Update count badge
  document.getElementById('galleryCount').textContent = gallery.length + ' foto';
  document.getElementById('photoCountBadge').textContent = gallery.length + ' foto';
}

function quickAssign(photoId) {
  const emptyIdx = stripSlots.findIndex(s => s === null);
  if (emptyIdx === -1) {
    showToast('Semua slot sudah terisi. Klik slot untuk ganti.');
    return;
  }
  stripSlots[emptyIdx] = photoId;
  buildStrip();
  updateDots();
  checkExportReady();
  showToast(`Foto masuk ke slot ${emptyIdx + 1}`);
}

function downloadSinglePhoto(dataURL, id) {
  const a = document.createElement('a');
  a.href = dataURL;
  a.download = `foto_${id}.jpg`;
  a.click();
}

function clearGallery() {
  if (!confirm('Hapus semua foto dari galeri?')) return;
  gallery = [];
  stripSlots = Array(frameCount).fill(null);
  document.getElementById('galleryGrid').innerHTML = '<div class="gallery-empty">Belum ada foto. Ambil foto dulu!</div>';
  document.getElementById('galleryCount').textContent = '0 foto';
  document.getElementById('photoCountBadge').textContent = '0 foto';
  buildStrip();
  updateDots();
  checkExportReady();
}

// ===== PICKER =====
function openPicker(slotIdx) {
  if (gallery.length === 0) {
    showToast('Ambil foto dulu!');
    return;
  }
  pickerTargetSlot = slotIdx;
  document.getElementById('pickerSub').textContent = `Untuk slot ke-${slotIdx + 1}`;

  const grid = document.getElementById('pickerGrid');
  grid.innerHTML = '';
  gallery.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'picker-item';
    if (stripSlots[slotIdx] === entry.id) item.style.borderColor = 'var(--accent)';

    const img = document.createElement('img');
    img.src = entry.dataURL;
    item.appendChild(img);

    const num = document.createElement('div');
    num.className = 'picker-item-num';
    num.textContent = '#' + entry.id;
    item.appendChild(num);

    item.onclick = () => assignPhoto(entry.id);
    grid.appendChild(item);
  });

  document.getElementById('pickerModal').classList.add('open');
}

function assignPhoto(photoId) {
  stripSlots[pickerTargetSlot] = photoId;
  closePicker();
  buildStrip();
  updateDots();
  checkExportReady();
  showToast(`Foto masuk ke slot ${pickerTargetSlot + 1}`);
}

function clearSlot() {
  stripSlots[pickerTargetSlot] = null;
  closePicker();
  buildStrip();
  updateDots();
  checkExportReady();
}

function closePicker() {
  document.getElementById('pickerModal').classList.remove('open');
}

function closePickerBackdrop(e) {
  if (e.target === document.getElementById('pickerModal')) closePicker();
}

// ===== RESET =====
function resetStrip() {
  stripSlots = Array(frameCount).fill(null);
  buildStrip();
  updateDots();
  checkExportReady();
}

// ===== EXPORT =====
function exportStrip() {
  const t = themes[currentTheme];
  const slotW = SLOT_W - t.paddingH * 2;
  const slotH = SLOT_H;
  const scale = 3;
  const gapSize = t.gapSize;
  const sprocketW = t.sprocket ? 18 : 0;
  const totalPadH = t.paddingH + sprocketW;
  const canvasW = (slotW + totalPadH * 2) * scale;
  const captionH = 42;
  const canvasH = (t.paddingTop + frameCount * slotH + (frameCount - 1) * gapSize + captionH + t.paddingBottom) * scale;

  const canvas = document.getElementById('outputCanvas');
  canvas.width = canvasW;
  canvas.height = canvasH;
  const ctx = canvas.getContext('2d');

  // BG
  if (t.checker) {
    ctx.fillStyle = '#f5e642'; ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = '#111';
    const cs = 20 * scale;
    for (let y = 0; y < canvasH; y += cs)
      for (let x = 0; x < canvasW; x += cs * 2)
        ctx.fillRect(x + (Math.floor(y / cs) % 2 === 0 ? cs : 0), y, cs, cs);
  } else if (t.y2k) {
    const grad = ctx.createLinearGradient(0, 0, 0, canvasH);
    grad.addColorStop(0, '#b14fff'); grad.addColorStop(.5, '#ff6eb4'); grad.addColorStop(1, '#40c9ff');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = 'rgba(255,255,255,0.07)';
    for (let y = 0; y < canvasH; y += 12 * scale)
      for (let x = 0; x < canvasW; x += 12 * scale) {
        ctx.beginPath(); ctx.arc(x, y, 2 * scale, 0, Math.PI * 2); ctx.fill();
      }
  } else {
    ctx.fillStyle = t.stripBg || '#fff';
    ctx.fillRect(0, 0, canvasW, canvasH);
  }

  // Sprockets
  if (t.sprocket) {
    ctx.fillStyle = t.sprocketColor;
    ctx.fillRect(0, 0, sprocketW * scale, canvasH);
    ctx.fillRect(canvasW - sprocketW * scale, 0, sprocketW * scale, canvasH);
    ctx.fillStyle = '#111';
    const hW = 8 * scale, hH = 14 * scale, hGap = 22 * scale;
    for (let y = hGap; y < canvasH - hH; y += hGap) {
      roundRect(ctx, 4 * scale, y, hW, hH, 2 * scale);
      roundRect(ctx, canvasW - 4 * scale - hW, y, hW, hH, 2 * scale);
    }
  }

  // Photos
  const promises = stripSlots.map((photoId, i) => new Promise(res => {
    if (photoId === null) { res(); return; }
    const entry = gallery.find(g => g.id === photoId);
    if (!entry) { res(); return; }
    const img = new Image();
    img.onload = () => {
      const x = totalPadH * scale;
      const y = (t.paddingTop + i * (slotH + gapSize)) * scale;
      const w = slotW * scale;
      const h = slotH * scale;
      ctx.fillStyle = '#111'; ctx.fillRect(x, y, w, h);
      ctx.drawImage(img, x, y, w, h);
      // Corners
      const cs2 = 20 * scale;
      ctx.strokeStyle = t.cornerColor; ctx.lineWidth = 2.5 * scale;
      [[x, y, x + cs2, y, x, y, x, y + cs2],
       [x + w - cs2, y, x + w, y, x + w, y, x + w, y + cs2],
       [x, y + h - cs2, x, y + h, x, y + h, x + cs2, y + h],
       [x + w - cs2, y + h, x + w, y + h, x + w, y + h, x + w, y + h - cs2]].forEach(pts => {
        ctx.beginPath();
        ctx.moveTo(pts[0], pts[1]); ctx.lineTo(pts[2], pts[3]);
        ctx.moveTo(pts[4], pts[5]); ctx.lineTo(pts[6], pts[7]);
        ctx.stroke();
      });
      res();
    };
    img.src = entry.dataURL;
  }));

  Promise.all(promises).then(() => {
    const captionY = (t.paddingTop + frameCount * (slotH + gapSize) - gapSize) * scale;
    ctx.fillStyle = t.captionBg;
    ctx.fillRect(0, captionY, canvasW, (captionH + t.paddingBottom) * scale);

    ctx.strokeStyle = t.watermarkColor; ctx.lineWidth = 1 * scale; ctx.globalAlpha = .35;
    ctx.beginPath();
    ctx.moveTo(totalPadH * scale, captionY + 6 * scale);
    ctx.lineTo(canvasW - totalPadH * scale, captionY + 6 * scale);
    ctx.stroke(); ctx.globalAlpha = 1;

    const caption = document.getElementById('captionInput').value || '✦ Blooming Your Days ✦';
    ctx.fillStyle = t.captionColor; ctx.textAlign = 'center';
    ctx.font = `${t.captionFont} ${18 * scale}px Georgia, serif`;
    ctx.fillText(caption, canvasW / 2, captionY + 28 * scale);

    ctx.font = `${10 * scale}px Georgia, serif`;
    ctx.fillStyle = t.watermarkColor; ctx.globalAlpha = .35;
    ctx.fillText('ZaysPhotoStrip Studio', canvasW / 2, canvasH - 6 * scale);
    ctx.globalAlpha = 1;

    const dataURL = canvas.toDataURL('image/jpeg', 0.95);
    document.getElementById('exportPreview').src = dataURL;
    document.getElementById('exportModal').classList.add('open');
    window._exportData = dataURL;
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath(); ctx.fill();
}

function downloadStrip() {
  if (!window._exportData) return;
  const a = document.createElement('a');
  a.href = window._exportData;
  a.download = `photostrip_${Date.now()}.jpg`;
  a.click();
}

function closeExportModal() { document.getElementById('exportModal').classList.remove('open'); }
function closeExportBackdrop(e) { if (e.target === document.getElementById('exportModal')) closeExportModal(); }

// ===== TOAST =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
